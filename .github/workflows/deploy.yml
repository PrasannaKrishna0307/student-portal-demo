name: CI/CD Deploy Student Portal

on:
  push:
    branches:
      - main

jobs:

  ################################
  # FRONTEND → S3
  ################################
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET }} \
          --delete \
          --exclude "node_modules/*" \
          --exclude "package.json" \
          --exclude "package-lock.json"

  ################################
  # BACKEND → EC2
  ################################
  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Deploy backend to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/student-portal-demo/backend
            git pull origin main
            npm install
            pm2 restart student-portal || pm2 start server.js --name student-portal